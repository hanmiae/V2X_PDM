server.port=1004

# PostgreSQL — 기본 DB "postgres" 의 public 스키마 사용 (DBver에서도 databases → postgres 선택)
# 수동 DDL: Back-end/scripts/postgresql/create_tables_public.sql (postgres DB에 연결 후 실행)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA — 테이블은 Flyway만 관리. update면 Hibernate가 스키마를 바꿔 명세와 어긋날 수 있음
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=postgresql

# Flyway (public 스키마에 테이블 생성)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
# 기존 DB에 객체는 있으나 flyway 이력이 없을 때(구 Hibernate 등) 기준선 후 마이그레이션 실행
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0